// ─── Sound Effects ───
const audioStarted = { current: false };
async function ensureAudio() {
  if (!audioStarted.current) {
    await Tone.start();
    audioStarted.current = true;
  }
}

function playCorrect() {
  ensureAudio().then(() => {
    const now = Tone.now();

    // Layer 1: Punchy bass hit
    const bass = new Tone.Synth({
      oscillator: { type: "triangle" },
      envelope: { attack: 0.005, decay: 0.2, sustain: 0, release: 0.1 },
    }).toDestination();
    bass.volume.value = -8;
    bass.triggerAttackRelease("C3", 0.2, now);
    setTimeout(() => bass.dispose(), 800);

    // Layer 2: Bright melodic fanfare
    const lead = new Tone.PolySynth(Tone.Synth, {
      maxPolyphony: 6,
      voice: Tone.Synth,
      options: {
        oscillator: { type: "triangle" },
        envelope: { attack: 0.005, decay: 0.08, sustain: 0.1, release: 0.12 },
      },
    }).toDestination();
    lead.volume.value = -10;
    lead.triggerAttackRelease("E5", 0.08, now + 0.02);
    lead.triggerAttackRelease("G5", 0.08, now + 0.08);
    lead.triggerAttackRelease("C6", 0.12, now + 0.14);
    lead.triggerAttackRelease("E6", 0.1, now + 0.22);
    lead.triggerAttackRelease("G6", 0.18, now + 0.30);
    setTimeout(() => lead.dispose(), 1500);

    // Layer 3: Warm resolve chord
    const pad = new Tone.PolySynth(Tone.Synth, {
      maxPolyphony: 3,
      voice: Tone.Synth,
      options: {
        oscillator: { type: "sine" },
        envelope: { attack: 0.08, decay: 0.3, sustain: 0.1, release: 0.3 },
      },
    }).toDestination();
    pad.volume.value = -14;
    pad.triggerAttackRelease("C5", 0.35, now + 0.18);
    pad.triggerAttackRelease("E5", 0.35, now + 0.18);
    pad.triggerAttackRelease("G5", 0.35, now + 0.18);
    setTimeout(() => pad.dispose(), 1500);
  });
}

function playIncorrect() {
  ensureAudio().then(() => {
    const now = Tone.now();
    const synth = new Tone.PolySynth(Tone.Synth, {
      maxPolyphony: 2,
      voice: Tone.Synth,
      options: {
        oscillator: { type: "square" },
        envelope: { attack: 0.005, decay: 0.12, sustain: 0.03, release: 0.15 },
      },
    }).toDestination();
    synth.volume.value = -14;
    synth.triggerAttackRelease("E3", 0.1, now);
    synth.triggerAttackRelease("C3", 0.15, now + 0.1);
    setTimeout(() => synth.dispose(), 1000);
  });
}

function playTick(urgent) {
  ensureAudio().then(() => {
    if (urgent) {
      // Urgent tick: sharper, louder
      const s = new Tone.MetalSynth({ frequency: 800, envelope: { attack: 0.001, decay: 0.06, release: 0.05 }, harmonicity: 0.1, modulationIndex: 4, resonance: 2000, octaves: 0.5 }).toDestination();
      s.volume.value = -16;
      s.triggerAttackRelease("16n");
    } else {
      // Gentle clock tick
      const s = new Tone.MetalSynth({ frequency: 600, envelope: { attack: 0.001, decay: 0.04, release: 0.03 }, harmonicity: 0.1, modulationIndex: 2, resonance: 1500, octaves: 0.5 }).toDestination();
      s.volume.value = -22;
      s.triggerAttackRelease("32n");
    }
  });
}

function playTimeout() {
  ensureAudio().then(() => {
    const synth = new Tone.Synth({ oscillator: { type: "sawtooth" }, envelope: { attack: 0.01, decay: 0.4, sustain: 0.1, release: 0.5 } }).toDestination();
    synth.volume.value = -14;
    synth.triggerAttackRelease("D3", "4n");
  });
}

function playGameOver() {
  ensureAudio().then(() => {
    const now = Tone.now();
    const synth = new Tone.PolySynth(Tone.Synth, {
      maxPolyphony: 4,
      voice: Tone.Synth,
      options: {
        oscillator: { type: "triangle" },
        envelope: { attack: 0.01, decay: 0.25, sustain: 0.15, release: 0.4 },
      },
    }).toDestination();
    synth.volume.value = -8;
    synth.triggerAttackRelease("G4", 0.2, now);
    synth.triggerAttackRelease("Eb4", 0.2, now + 0.22);
    synth.triggerAttackRelease("C4", 0.2, now + 0.44);
    synth.triggerAttackRelease("G3", 0.4, now + 0.66);
    setTimeout(() => synth.dispose(), 2000);
  });
}

function playVictoryChime() {
  ensureAudio().then(() => {
    const now = Tone.now();
    // Rich bell strike
    const bell = new Tone.MetalSynth({
      frequency: 440,
      envelope: { attack: 0.001, decay: 0.8, release: 0.6 },
      harmonicity: 5.1,
      modulationIndex: 16,
      resonance: 3000,
      octaves: 1.5,
    }).toDestination();
    bell.volume.value = -14;
    bell.triggerAttackRelease("8n", now);
    setTimeout(() => bell.dispose(), 2000);

    // Harmonic shimmer on top
    const shimmer = new Tone.PolySynth(Tone.Synth, {
      maxPolyphony: 3,
      voice: Tone.Synth,
      options: {
        oscillator: { type: "sine" },
        envelope: { attack: 0.05, decay: 0.5, sustain: 0.05, release: 0.4 },
      },
    }).toDestination();
    shimmer.volume.value = -16;
    shimmer.triggerAttackRelease("C6", 0.4, now + 0.05);
    shimmer.triggerAttackRelease("E6", 0.4, now + 0.05);
    shimmer.triggerAttackRelease("G6", 0.4, now + 0.05);
    setTimeout(() => shimmer.dispose(), 2000);
  });
}

function playScoreUp() {
  ensureAudio().then(() => {
    const s = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.003, decay: 0.04, sustain: 0, release: 0.03 } }).toDestination();
    s.volume.value = -18;
    s.triggerAttackRelease("E6", 0.03);
    setTimeout(() => s.dispose(), 200);
  });
}

function playScoreDown() {
  ensureAudio().then(() => {
    const s = new Tone.Synth({ oscillator: { type: "square" }, envelope: { attack: 0.003, decay: 0.04, sustain: 0, release: 0.03 } }).toDestination();
    s.volume.value = -20;
    s.triggerAttackRelease("C3", 0.03);
    setTimeout(() => s.dispose(), 200);
  });
}

function playKeypress() {
  ensureAudio().then(() => {
    const synth = new Tone.NoiseSynth({ noise: { type: "white" }, envelope: { attack: 0.002, decay: 0.02, sustain: 0, release: 0.02 } }).toDestination();
    synth.volume.value = -30;
    synth.triggerAttackRelease("32n");
  });
}

const PUZZLE_TYPES = [
  "scrambled",
  "firstLetter",
  "reversed",
  "vowelRemoved",
  "consonantRemoved",
];

function getTier(round) {
  if (round <= 10) return 0;
  if (round <= 20) return 1;
  if (round <= 40) return 2;
  return 3;
}

function scrambleWord(word) {
  if (word.length <= 2) return word;
  let arr = word.split("");
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.join("") === word ? arr.reverse().join("") : arr.join("");
}

function caesarShift(text, shift) {
  return text
    .split("")
    .map((c) => {
      if (/[a-z]/.test(c))
        return String.fromCharCode(((c.charCodeAt(0) - 97 + shift) % 26) + 97);
      if (/[A-Z]/.test(c))
        return String.fromCharCode(((c.charCodeAt(0) - 65 + shift) % 26) + 65);
      return c;
    })
    .join("");
}

function removeVowels(text) {
  return text.replace(/[aeiouAEIOU]/g, "_");
}

function removeConsonants(text) {
  return text.replace(/[bcdfghjklmnpqrstvwxyzBCDFGHJKLMNPQRSTVWXYZ]/g, "_");
}

function synonymReplace(phrase) {
  let words = phrase.split(" ");
  return words
    .map((w) => {
      let clean = w.toLowerCase().replace(/[^a-z]/g, "");
      if (SYNONYMS[clean]) {
        let punct = w.replace(/[a-zA-Z]/g, "");
        return `[${SYNONYMS[clean]}]${punct}`;
      }
      return w;
    })
    .join(" ");
}

function mathEncode(phrase) {
  const ops = [
    (n) => ({ q: `${n + 3} - 3`, a: n }),
    (n) => ({ q: `${n * 2} ÷ 2`, a: n }),
    (n) => ({ q: `${n - 1} + 1`, a: n }),
    (n) => ({ q: `${Math.floor(n / 2)} × 2${n % 2 ? " + 1" : ""}`, a: n }),
  ];
  return phrase
    .split("")
    .map((c) => {
      if (/[a-zA-Z]/.test(c)) {
        let code = c.toLowerCase().charCodeAt(0) - 96;
        let op = ops[Math.floor(Math.random() * ops.length)](code);
        return `(${op.q})`;
      }
      return c === " " ? " / " : c;
    })
    .join("");
}

function generatePuzzle(round) {
  const tier = getTier(round);
  const phrasePool = PHRASES_BY_TIER[tier] || PHRASES_BY_TIER[3];
  const phrase = phrasePool[Math.floor(Math.random() * phrasePool.length)];

  let availableTypes = [...PUZZLE_TYPES];
  if (tier <= 1) availableTypes = ["scrambled", "reversed", "vowelRemoved"];
  if (tier >= 2) availableTypes = ["scrambled", "reversed", "vowelRemoved", "consonantRemoved", "firstLetter"];

  const type = availableTypes[Math.floor(Math.random() * availableTypes.length)];

  let clueText, hintType;

  switch (type) {
    case "scrambled":
      clueText = phrase.split(" ").map(scrambleWord).join("  ");
      hintType = "Unscramble the words";
      break;
    case "firstLetter":
      clueText = phrase
        .split(" ")
        .map((w) => w[0] + "_ ".repeat(w.length - 1).trim())
        .join("  ");
      hintType = "Fill in the blanks";
      break;
    case "reversed":
      clueText = phrase.split(" ").reverse().join("  ");
      hintType = "Words are in reverse order";
      break;
    case "vowelRemoved":
      clueText = removeVowels(phrase);
      hintType = "Vowels have been removed";
      break;
    case "consonantRemoved":
      clueText = removeConsonants(phrase);
      hintType = "Consonants have been removed";
      break;
    default:
      clueText = scrambleWord(phrase);
      hintType = "Unscramble";
  }

  return { phrase, clueText, hintType, type, tier };
}

function getProgressiveClue(puzzle, timeLeft) {
  const { phrase, clueText, type } = puzzle;
  const words = phrase.split(" ");
  const progress = 1 - timeLeft / 30;

  if (progress < 0.33) return { display: clueText, extra: null };

  if (progress < 0.66) {
    const revealCount = Math.floor(words.length * 0.3);
    const revealed = words.slice(0, revealCount).join(" ");
    return {
      display: clueText,
      extra: `Hint: starts with "${revealed}..."`,
    };
  }

  const revealCount = Math.ceil(words.length * 0.6);
  const revealed = words.slice(0, revealCount).join(" ");
  const blanks = words
    .slice(revealCount)
    .map((w) => "_ ".repeat(w.length).trim())
    .join("  ");
  return {
    display: clueText,
    extra: `${revealed} ${blanks}`,
  };
}

function getEncouragement(round, correct) {
  if (!correct) {
    if (round <= 5) return "So close! You've got this — keep going!";
    if (round <= 15) return "Tough one! Shake it off.";
    return "That was a hard one. Stay sharp.";
  }
  if (round <= 3) return "Great start! You're a natural!";
  if (round <= 6) return "You're on fire! Keep it up!";
  if (round <= 10) return "Impressive! The puzzles are getting harder…";
  if (round <= 20) return "Brilliant solve!";
  if (round <= 35) return "Incredible intellect!";
  return "Absolutely elite. Wow.";
}

          0% { text-shadow: 0 2px 40px rgba(0,0,0,0.5), 0 0 60px rgba(184,115,74,0.12); }
          100% { text-shadow: 0 2px 40px rgba(0,0,0,0.5), 0 0 80px rgba(184,115,74,0.25), 0 0 120px rgba(184,115,74,0.08); }
        }
        @keyframes titleOrb1 { 0% { transform: translate(0,0); } 100% { transform: translate(30px,-40px); } }
        @keyframes titleOrb2 { 0% { transform: translate(0,0); } 100% { transform: translate(-40px,25px); } }
        @keyframes titleOrb3 { 0% { transform: translate(0,0); } 100% { transform: translate(25px,35px); } }
        @keyframes btnGlow {
          0% { box-shadow: 0 4px 24px rgba(184, 115, 74, 0.3); }
          100% { box-shadow: 0 4px 32px rgba(184, 115, 74, 0.55), 0 0 60px rgba(184, 115, 74, 0.15); }
        }
      `}</style>
    </div>
  );
}

function GameScreen({ onGameOver }) {
  const [round, setRound] = useState(1);
  const [score, setScore] = useState(5);
  const [passes, setPasses] = useState(3);
  const [timeLeft, setTimeLeft] = useState(30);
  const [puzzle, setPuzzle] = useState(null);
  const [guess, setGuess] = useState("");
  const [phase, setPhase] = useState("playing"); // playing, scoring, correct, incorrect, timeout, reveal
  const [message, setMessage] = useState("");
  const [lastGuess, setLastGuess] = useState("");
  const [shakeInput, setShakeInput] = useState(false);
  const [scoreAnim, setScoreAnim] = useState(null); // { isGain, totalPts, pointsLeft, displayScore, animPhase: 'grow'|'count'|'done' }
  const timerRef = useRef(null);
  const inputRef = useRef(null);
  const scoreAnimRef = useRef(null);

  const startRound = useCallback((r) => {
    const p = generatePuzzle(r);
    setPuzzle(p);
    setTimeLeft(30);
    setGuess("");
    setLastGuess("");
    setPhase("ready");
    setMessage("");
    setTimeout(() => setPhase("playing"), 500);
  }, []);

  useEffect(() => { startRound(1); }, [startRound]);

  // Desktop keyboard support during play
  useEffect(() => {
    if (phase !== "playing" && phase !== "ready") return;
    const handleKey = (e) => {
      if (e.key === "Enter") { handleSubmit(); return; }
      if (e.key === "Backspace") { e.preventDefault(); setGuess((g) => g.slice(0, -1)); return; }
      if (e.key === " ") { e.preventDefault(); setGuess((g) => g + " "); playKeypress(); return; }
      if (/^[a-zA-Z]$/.test(e.key)) { setGuess((g) => (g + e.key).toUpperCase()); playKeypress(); }
    };
    document.addEventListener("keydown", handleKey);
    return () => document.removeEventListener("keydown", handleKey);
  }, [phase, puzzle, guess]);

  // Enter key advances to next round when not playing
  useEffect(() => {
    if (phase === "playing" || phase === "scoring" || phase === "ready") return;
    const handleKey = (e) => {
      if (e.key === "Enter" && (phase === "correct" || phase === "reveal" || phase === "incorrect")) {
        handleNext();
      }
    };
    document.addEventListener("keydown", handleKey);
    return () => document.removeEventListener("keydown", handleKey);
  });

  useEffect(() => {
    if (phase !== "playing" || !puzzle) return;
    timerRef.current = setInterval(() => {
      setTimeLeft((t) => {
        if (t <= 1) {
          clearInterval(timerRef.current);
          setPhase("timeout");
          return 0;
        }
        const next = t - 1;
        if (next <= 10) {
          playTick(true);
        } else if (next % 5 === 0) {
          playTick(false);
        }
        return next;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [phase, puzzle]);

  useEffect(() => {
    if (phase === "timeout") {
      playTimeout();
      const newPasses = passes - 1;
      setPasses(newPasses);
      if (newPasses <= 0) {
        setMessage("Out of passes!");
        playGameOver();
        setTimeout(() => onGameOver(score, round), 2000);
      } else {
        setMessage(`Time's up! The answer was: "${puzzle.phrase.toUpperCase()}"`);
        setPhase("reveal");
      }
    }
  }, [phase]);

  const handleSubmit = () => {
    if (phase !== "playing" || !guess.trim()) return;
    clearInterval(timerRef.current);
    setLastGuess(guess);

    const normalize = (s) => s.toLowerCase().replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ").trim();
    const isCorrect = normalize(guess) === normalize(puzzle.phrase);
    const pts = timeLeft;

    if (isCorrect) {
      playCorrect();
      setPhase("scoring");
      setScoreAnim({ isGain: true, totalPts: pts, pointsLeft: pts, displayScore: score, animPhase: "celebrate" });
      // Let player process the win, then start counting
      setTimeout(() => {
        setScoreAnim((prev) => prev ? { ...prev, animPhase: "grow" } : null);
      }, 2500);
      setTimeout(() => {
        setScoreAnim((prev) => prev ? { ...prev, animPhase: "count" } : null);
      }, 3100);
    } else {
      playIncorrect();
      setShakeInput(true);
      setTimeout(() => setShakeInput(false), 500);
      const newPasses = passes - 1;
      setPasses(newPasses);
      setPhase("scoring");
      setScoreAnim({ isGain: false, totalPts: pts, pointsLeft: pts, displayScore: score, animPhase: "celebrate", passesAfter: newPasses });
      setTimeout(() => {
        setScoreAnim((prev) => prev ? { ...prev, animPhase: "grow" } : null);
      }, 1800);
      setTimeout(() => {
        setScoreAnim((prev) => prev ? { ...prev, animPhase: "count" } : null);
      }, 2300);
    }
  };

  // Scoring count animation
  useEffect(() => {
    if (!scoreAnim || scoreAnim.animPhase !== "count") return;
    if (scoreAnim.pointsLeft <= 0) {
      // Pause at "done" — wait for user click/tap/key
      setScore(scoreAnim.displayScore);
      if (scoreAnim.isGain) playVictoryChime();
      setScoreAnim((prev) => prev ? { ...prev, animPhase: "done" } : null);
      return;
    }
    const speed = scoreAnim.totalPts > 20 ? 30 : scoreAnim.totalPts > 10 ? 50 : 80;
    scoreAnimRef.current = setTimeout(() => {
      setScoreAnim((prev) => {
        if (!prev) return null;
        if (prev.isGain) {
          playScoreUp();
          return { ...prev, pointsLeft: prev.pointsLeft - 1, displayScore: prev.displayScore + 1 };
        } else {
          playScoreDown();
          return { ...prev, pointsLeft: prev.pointsLeft - 1, displayScore: prev.displayScore - 1 };
        }
      });
    }, speed);
    return () => clearTimeout(scoreAnimRef.current);
  }, [scoreAnim]);

  // Handle dismiss of score animation
  const dismissScoreAnim = useCallback(() => {
    if (!scoreAnim || scoreAnim.animPhase !== "done") return;
    const isGain = scoreAnim.isGain;
    const pts = scoreAnim.totalPts;
    const finalScore = scoreAnim.displayScore;
    const encouragement = getEncouragement(round, isGain);
    setScoreAnim(null);
    if (isGain) {
      setMessage(`+${pts} points! ${encouragement}`);
      setPhase("correct");
    } else {
      setMessage(`-${pts} points. ${encouragement}`);
      if (scoreAnim.passesAfter !== undefined && scoreAnim.passesAfter <= 0) {
        setPhase("incorrect");
        playGameOver();
        setTimeout(() => onGameOver(finalScore, round), 2000);
      } else {
        setPhase("incorrect");
      }
    }
  }, [scoreAnim, round, onGameOver]);

  useEffect(() => {
    if (!scoreAnim || scoreAnim.animPhase !== "done") return;
    const handleClick = () => dismissScoreAnim();
    const handleKey = (e) => { dismissScoreAnim(); };
    document.addEventListener("click", handleClick);
    document.addEventListener("keydown", handleKey);
    return () => {
      document.removeEventListener("click", handleClick);
      document.removeEventListener("keydown", handleKey);
    };
  }, [scoreAnim, dismissScoreAnim]);

  const handleNext = () => {
    if (round >= 60) {
      playGameOver();
      setTimeout(() => onGameOver(score, round), 1500);
      return;
    }
    const nextRound = round + 1;
    setRound(nextRound);
    startRound(nextRound);
  };

  const handlePass = () => {
    if (phase !== "playing") return;
    clearInterval(timerRef.current);
    const newPasses = passes - 1;
    setPasses(newPasses);
    if (newPasses <= 0) {
      onGameOver(score, round);
      return;
    }
    setMessage(`Passed. The answer was: "${puzzle.phrase.toUpperCase()}"`);
    setPhase("reveal");
  };

  const progressiveClue = puzzle && (phase === "playing" || phase === "ready") ? getProgressiveClue(puzzle, timeLeft) : null;
  const timerPct = (timeLeft / 30) * 100;
  const timerColor = timeLeft > 15 ? COLORS.olive : timeLeft > 7 ? COLORS.gold : COLORS.rustDark;

  return (
    <div style={{
      height: "100dvh", minHeight: "0", display: "flex", flexDirection: "column",
      background: `linear-gradient(180deg, ${COLORS.bgDark} 0%, ${COLORS.bg} 100%)`,
      fontFamily: "'DM Sans', sans-serif", color: COLORS.cream,
      maxWidth: "100vw", overflow: "hidden", position: "relative",
    }}>
      {/* Ambient background effects */}
      <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0 }}>
        {/* Slow drifting gradient overlay */}
        <div style={{
          position: "absolute", inset: 0,
          background: `radial-gradient(ellipse at 30% 20%, ${COLORS.rust}08 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, ${COLORS.dustyTeal}08 0%, transparent 60%)`,
          animation: "ambientDrift 20s ease-in-out infinite alternate",
        }} />
        {/* Floating orbs */}
        <div className="orb orb1" />
        <div className="orb orb2" />
        <div className="orb orb3" />
        {/* Subtle dot grid */}
        <div style={{
          position: "absolute", inset: 0, opacity: 0.025,
          backgroundImage: `radial-gradient(${COLORS.sand} 1px, transparent 1px)`,
          backgroundSize: "32px 32px",
        }} />
        {/* Vignette */}
        <div style={{
          position: "absolute", inset: 0,
          background: "radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%)",
        }} />
      </div>

      {/* Content layer */}
      <div style={{ position: "relative", zIndex: 1, display: "flex", flexDirection: "column", flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
      {/* Header */}
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "16px 20px 12px", borderBottom: `1px solid ${COLORS.muted}20`,
      }}>
        <div>
          <div style={{ fontSize: "10px", letterSpacing: "3px", color: COLORS.stone, textTransform: "uppercase" }}>
            Round
          </div>
          <div style={{ fontSize: "28px", fontWeight: 700, fontFamily: "'Playfair Display', serif", lineHeight: 1.1 }}>
            {round}
          </div>
        </div>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: "10px", letterSpacing: "3px", color: COLORS.stone, textTransform: "uppercase" }}>
            Score
          </div>
          <div style={{
            fontSize: "28px", fontWeight: 700, fontFamily: "'Playfair Display', serif",
            color: (scoreAnim && scoreAnim.animPhase !== "celebrate") ? (scoreAnim.isGain ? COLORS.oliveLight : COLORS.rustLight) : score > 10 ? COLORS.cream : score > 3 ? COLORS.gold : COLORS.rustDark,
            lineHeight: 1.1,
            transition: "color 0.2s",
          }}>
            {scoreAnim ? scoreAnim.displayScore : score}
          </div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ display: "flex", gap: "6px", justifyContent: "flex-end", alignItems: "center" }}>
            {[0, 1, 2].map((i) => (
              <svg key={i} width="26" height="24" viewBox="0 0 24 22" style={{
                transition: "all 0.4s ease",
                opacity: i < passes ? 1 : 0.2,
                transform: i < passes ? "scale(1)" : "scale(0.85)",
                filter: i < passes ? `drop-shadow(0 2px 6px rgba(184,115,74,0.5))` : "none",
              }}>
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                  fill={i < passes ? COLORS.rust : COLORS.muted}
                />
              </svg>
            ))}
          </div>
        </div>
      </div>

      {/* Timer Bar */}
      <div style={{ height: "4px", background: `${COLORS.muted}20`, position: "relative" }}>
        <div style={{
          height: "100%", width: `${timerPct}%`, background: timerColor,
          transition: "width 1s linear, background 0.5s ease",
          borderRadius: "0 2px 2px 0",
        }} />
      </div>

      {/* Timer Number */}
      <div style={{
        textAlign: "center", padding: "16px 0 8px",
      }}>
        <span style={{
          fontSize: "48px", fontWeight: 700, fontFamily: "'Playfair Display', serif",
          color: timerColor, transition: "color 0.5s ease",
          ...(timeLeft <= 5 && phase === "playing" ? {
            animation: "timerGlow 0.8s ease infinite",
          } : timeLeft <= 10 && phase === "playing" ? {
            textShadow: `0 0 12px ${timerColor}60`,
          } : {}),
        }}>
          {timeLeft}
        </span>
        <span style={{ fontSize: "14px", color: COLORS.stone, marginLeft: "4px" }}>s</span>
      </div>

      {/* Scoring Animation Overlay */}
      {scoreAnim && (
        <div style={{
          position: "fixed", inset: 0, display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
          zIndex: 100,
          pointerEvents: scoreAnim.animPhase === "done" ? "auto" : "none",
          cursor: scoreAnim.animPhase === "done" ? "pointer" : "default",
          background: `rgba(0,0,0,${scoreAnim.animPhase === "celebrate" ? 0.5 : scoreAnim.animPhase === "grow" ? 0.4 : 0.3})`,
          transition: "background 0.5s ease",
        }}>

          {/* ── Celebrate Phase: Big CORRECT / WRONG ── */}
          {scoreAnim.animPhase === "celebrate" && (
            <div style={{ textAlign: "center", animation: "celebrateIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards" }}>
              <div style={{
                fontSize: "clamp(48px, 12vw, 72px)", fontWeight: 700,
                fontFamily: "'Playfair Display', serif",
                color: scoreAnim.isGain ? COLORS.oliveLight : COLORS.rustLight,
                textShadow: scoreAnim.isGain
                  ? `0 0 40px rgba(143,163,130,0.5), 0 0 80px rgba(143,163,130,0.2)`
                  : `0 0 40px rgba(139,74,42,0.5), 0 0 80px rgba(139,74,42,0.2)`,
                letterSpacing: "4px",
              }}>
                {scoreAnim.isGain ? "CORRECT!" : "WRONG"}
              </div>
              <div style={{
                marginTop: "16px", fontSize: "15px",
                color: scoreAnim.isGain ? COLORS.sage : COLORS.stone,
                fontFamily: "'DM Sans', sans-serif", letterSpacing: "1px",
              }}>
                {scoreAnim.isGain
                  ? `${scoreAnim.totalPts} seconds on the clock`
                  : `${scoreAnim.totalPts} seconds remaining`
                }
              </div>
              <div style={{
                marginTop: "8px", fontSize: "14px",
                color: COLORS.stone, fontFamily: "'DM Sans', sans-serif",
                opacity: 0.7,
              }}>
                {scoreAnim.isGain ? "Points incoming..." : "Points deducted..."}
              </div>
            </div>
          )}

          {/* ── Grow & Count Phases: Points Number ── */}
          {(scoreAnim.animPhase === "grow" || scoreAnim.animPhase === "count" || scoreAnim.animPhase === "done") && (
            <>
              <div style={{
                fontFamily: "'Playfair Display', serif", fontWeight: 700,
                color: scoreAnim.isGain ? COLORS.oliveLight : COLORS.rustLight,
                textAlign: "center",
                fontSize: scoreAnim.animPhase === "grow" ? "120px" : "96px",
                transform: scoreAnim.animPhase === "grow" ? "translateY(-40px) scale(0.3)" : "translateY(0) scale(1)",
                opacity: scoreAnim.animPhase === "grow" ? 0 : 1,
                transition: scoreAnim.animPhase === "grow"
                  ? "all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)"
                  : "font-size 0.15s ease",
                textShadow: `0 4px 40px ${scoreAnim.isGain ? "rgba(143,163,130,0.6)" : "rgba(139,74,42,0.6)"}`,
                animation: scoreAnim.animPhase === "grow" ? "scoreGrow 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards" : "none",
              }}>
                {scoreAnim.animPhase === "done"
                  ? (scoreAnim.isGain ? `+${scoreAnim.totalPts}` : `−${scoreAnim.totalPts}`)
                  : `${scoreAnim.isGain ? "+" : "−"}${scoreAnim.pointsLeft}`
                }
              </div>
              {/* Encouragement on done */}
              {scoreAnim.animPhase === "done" && (
                <div style={{
                  fontSize: "16px", color: scoreAnim.isGain ? COLORS.oliveLight : COLORS.rustLight,
                  marginTop: "8px", fontWeight: 600,
                }}>
                  {getEncouragement(round, scoreAnim.isGain)}
                </div>
              )}
              {/* Label during count */}
              <div style={{
                fontSize: "14px", letterSpacing: "3px", textTransform: "uppercase",
                color: scoreAnim.isGain ? COLORS.sage : COLORS.rustLight,
                marginTop: "8px",
                opacity: scoreAnim.animPhase === "count" ? 1 : 0,
                transition: "opacity 0.3s ease",
              }}>
                {scoreAnim.isGain ? "Points earned from clock" : "Points lost from clock"}
              </div>
              {/* Arrow showing direction */}
              {scoreAnim.animPhase === "count" && (
                <div style={{
                  marginTop: "24px", display: "flex", alignItems: "center", gap: "16px",
                  fontSize: "18px", fontFamily: "'DM Sans', sans-serif", fontWeight: 600,
                }}>
                  <span style={{ color: COLORS.stone }}>⏱ {timeLeft - (scoreAnim.totalPts - scoreAnim.pointsLeft)}</span>
                  <span style={{ color: scoreAnim.isGain ? COLORS.oliveLight : COLORS.rustLight, fontSize: "24px" }}>→</span>
                  <span style={{ color: scoreAnim.isGain ? COLORS.oliveLight : COLORS.rustLight }}>
                    SCORE {scoreAnim.displayScore}
                  </span>
                </div>
              )}
              {/* Final score display on done */}
              {scoreAnim.animPhase === "done" && (
                <div style={{
                  marginTop: "20px", fontSize: "18px", fontFamily: "'DM Sans', sans-serif", fontWeight: 600,
                  color: COLORS.cream,
                }}>
                  SCORE: {scoreAnim.displayScore}
                </div>
              )}
              {/* Tap to continue */}
              {scoreAnim.animPhase === "done" && (
                <div style={{
                  marginTop: "40px", fontSize: "13px", letterSpacing: "2px",
                  textTransform: "uppercase", color: COLORS.stone,
                  animation: "pulse 1.5s ease infinite",
                }}>
                  tap anywhere to continue
                </div>
              )}
            </>
          )}
        </div>
      )}

      {/* Puzzle type hint - only during active play */}
      {(phase === "playing" || phase === "ready" || phase === "scoring") && (
      <div style={{ textAlign: "center", marginBottom: "16px" }}>
        <span style={{
          fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase",
          color: COLORS.stone, background: `${COLORS.muted}15`,
          padding: "4px 12px", borderRadius: "10px",
        }}>
          {puzzle?.hintType}
        </span>
      </div>
      )}

      {/* Puzzle Card */}
      <div style={{ flex: 1, padding: "0 20px", display: "flex", flexDirection: "column" }}>
        <div style={{
          background: `${COLORS.bgCard}`,
          borderRadius: "16px", padding: "24px 20px",
          border: `1px solid ${COLORS.muted}20`,
          minHeight: "140px", display: "flex", flexDirection: "column",
          justifyContent: "center", alignItems: "center",
          boxShadow: `0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 ${COLORS.muted}10`,
          position: "relative", overflow: "hidden",
        }}>
          {/* Card shimmer */}
          <div style={{
            position: "absolute", inset: 0, pointerEvents: "none",
            background: `linear-gradient(105deg, transparent 40%, ${COLORS.sand}06 45%, ${COLORS.sand}0a 50%, ${COLORS.sand}06 55%, transparent 60%)`,
            backgroundSize: "200% 100%",
            animation: "shimmer 6s ease-in-out infinite",
          }} />
          <div style={{
            fontSize: "17px", lineHeight: 1.7, textAlign: "center",
            color: (phase === "correct" || phase === "incorrect" || phase === "reveal" || phase === "timeout")
              ? COLORS.oliveLight : COLORS.sandLight,
            wordBreak: "break-word",
            fontFamily: "'IBM Plex Mono', monospace", letterSpacing: "0.5px",
            textTransform: "uppercase",
            transition: "color 0.3s ease",
          }}>
            {(phase === "playing" || phase === "ready" || phase === "scoring")
              ? (progressiveClue?.display || puzzle?.clueText)
              : puzzle?.phrase}
          </div>
          {progressiveClue?.extra && (phase === "playing" || phase === "ready") && (
            <div style={{
              marginTop: "16px", padding: "10px 16px",
              background: `${COLORS.olive}15`, borderRadius: "10px",
              fontSize: "14px", color: COLORS.sage, textAlign: "center",
              border: `1px solid ${COLORS.olive}25`, textTransform: "uppercase",
            }}>
              {progressiveClue.extra}
            </div>
          )}
        </div>

        {/* Message Banner */}
        {message && !scoreAnim && (
          <div style={{
            marginTop: "16px", padding: "14px 16px", borderRadius: "12px", textAlign: "center",
            fontSize: "14px", lineHeight: 1.5,
            background: phase === "correct" ? `${COLORS.olive}20` : phase === "incorrect" ? `${COLORS.rustDark}20` : `${COLORS.gold}15`,
            color: phase === "correct" ? COLORS.oliveLight : phase === "incorrect" ? COLORS.rustLight : COLORS.gold,
            border: `1px solid ${phase === "correct" ? COLORS.olive : phase === "incorrect" ? COLORS.rustDark : COLORS.gold}30`,
          }}>
            {message}
            {phase === "incorrect" && lastGuess && (
              <div style={{ marginTop: "12px", fontSize: "13px", lineHeight: 1.7 }}>
                <div style={{ color: COLORS.rustLight, opacity: 0.8 }}>
                  YOUR ANSWER: <span style={{ color: COLORS.rustLight, fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600 }}>{lastGuess}</span>
                </div>
                <div style={{ color: COLORS.oliveLight, marginTop: "4px" }}>
                  CORRECT: <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600 }}>{puzzle.phrase.toUpperCase()}</span>
                </div>
              </div>
            )}
          </div>
        )}

        {/* Answer area */}
        {(phase === "playing" || phase === "ready") && (
          <div style={{ marginTop: "auto", paddingTop: "8px", paddingBottom: "env(safe-area-inset-bottom, 8px)" }}>
            {/* Guess display */}
            <div style={{
              display: "flex", gap: "8px", marginBottom: "8px",
              animation: shakeInput ? "shake 0.4s ease" : "none",
            }}>
              <div
                style={{
                  flex: 1, padding: "12px 14px", borderRadius: "10px",
                  background: COLORS.bgDark, border: `1px solid ${COLORS.rust}60`,
                  color: COLORS.cream, fontSize: "16px", minHeight: "44px",
                  fontFamily: "'DM Sans', sans-serif",
                  textTransform: "uppercase", letterSpacing: "1px",
                  display: "flex", alignItems: "center",
                  overflow: "hidden", whiteSpace: "nowrap",
                }}
              >
                {guess || <span style={{ color: COLORS.muted }}>TYPE YOUR ANSWER...</span>}
                <span style={{ opacity: 0.6, animation: "pulse 1s ease infinite", marginLeft: "1px" }}>|</span>
              </div>
              <button onClick={handleSubmit} style={{
                padding: "12px 18px", borderRadius: "10px",
                background: COLORS.rust, border: "none", color: COLORS.warmWhite,
                fontSize: "14px", fontWeight: 600, cursor: "pointer",
                letterSpacing: "1px", textTransform: "uppercase",
                whiteSpace: "nowrap",
              }}>
                Go
              </button>
            </div>
            {/* In-game keyboard */}
            <div style={{ display: "flex", flexDirection: "column", gap: "5px" }}>
              {[
                ["Q","W","E","R","T","Y","U","I","O","P"],
                ["A","S","D","F","G","H","J","K","L"],
                ["Z","X","C","V","B","N","M"],
              ].map((row, ri) => (
                <div key={ri} style={{ display: "flex", justifyContent: "center", gap: "4px" }}>
                  {ri === 2 && (
                    <button onClick={handlePass} style={{
                      padding: "10px 6px", borderRadius: "6px", border: "none",
                      background: passes > 0 ? `${COLORS.maroon}90` : `${COLORS.muted}30`,
                      color: passes > 0 ? COLORS.sand : COLORS.muted,
                      fontSize: "9px", fontWeight: 600, cursor: passes > 0 ? "pointer" : "not-allowed",
                      letterSpacing: "0.5px", textTransform: "uppercase",
                      minWidth: "44px", fontFamily: "'DM Sans', sans-serif",
                    }}>
                      PASS ♥{passes}
                    </button>
                  )}
                  {row.map((key) => (
                    <button
                      key={key}
                      onClick={() => { setGuess((g) => (g + key).toUpperCase()); playKeypress(); }}
                      style={{
                        flex: 1, maxWidth: "36px", padding: "11px 0", borderRadius: "6px",
                        background: `${COLORS.bgCard}`, border: `1px solid ${COLORS.muted}20`,
                        color: COLORS.cream, fontSize: "14px", fontWeight: 600,
                        cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                        WebkitTapHighlightColor: "transparent",
                      }}
                    >
                      {key}
                    </button>
                  ))}
                  {ri === 2 && (
                    <button onClick={() => setGuess((g) => g.slice(0, -1))} style={{
                      padding: "10px 6px", borderRadius: "6px", border: "none",
                      background: `${COLORS.bgCard}`, color: COLORS.sand,
                      fontSize: "14px", cursor: "pointer", minWidth: "44px",
                      fontFamily: "'DM Sans', sans-serif",
                      border: `1px solid ${COLORS.muted}20`,
                    }}>
                      ⌫
                    </button>
                  )}
                </div>
              ))}
              <div style={{ display: "flex", justifyContent: "center", gap: "4px" }}>
                <button onClick={() => { setGuess((g) => g + " "); playKeypress(); }} style={{
                  flex: 1, maxWidth: "220px", padding: "10px 0", borderRadius: "6px",
                  background: `${COLORS.bgCard}`, border: `1px solid ${COLORS.muted}20`,
                  color: COLORS.stone, fontSize: "11px", cursor: "pointer",
                  letterSpacing: "2px", textTransform: "uppercase",
                  fontFamily: "'DM Sans', sans-serif",
                }}>
                  SPACE
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Next Round / Game Over buttons */}
        {!scoreAnim && (phase === "correct" || phase === "reveal" || phase === "incorrect") && (
          <div style={{ marginTop: "auto", paddingBottom: "24px", paddingTop: "16px" }}>
            <button onClick={handleNext} style={{
              width: "100%", padding: "16px", borderRadius: "12px",
              background: COLORS.rust, border: "none", color: COLORS.warmWhite,
              fontSize: "15px", fontWeight: 600, cursor: "pointer",
              letterSpacing: "2px", textTransform: "uppercase",
            }}>
              Next Round → <span style={{ fontSize: "11px", opacity: 0.6, marginLeft: "8px" }}>⏎</span>
            </button>
          </div>
        )}
      </div>
      </div>{/* end content layer */}

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @keyframes scoreGrow { 0% { transform: translateY(-60px) scale(0.3); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes celebrateIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes ambientDrift {
          0% { transform: translate(0, 0) scale(1); }
          50% { transform: translate(15px, -10px) scale(1.02); }
          100% { transform: translate(-10px, 8px) scale(0.98); }
        }
        @keyframes orbFloat1 {
          0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.04; }
          33% { transform: translate(40px, -60px) scale(1.1); opacity: 0.07; }
          66% { transform: translate(-30px, -20px) scale(0.95); opacity: 0.03; }
        }
        @keyframes orbFloat2 {
          0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.03; }
          40% { transform: translate(-50px, 30px) scale(1.15); opacity: 0.06; }
          70% { transform: translate(20px, 50px) scale(0.9); opacity: 0.04; }
        }
        @keyframes orbFloat3 {
          0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.025; }
          50% { transform: translate(30px, 40px) scale(1.2); opacity: 0.055; }
        }
        @keyframes shimmer {
          0% { background-position: -200% center; }
          100% { background-position: 200% center; }
        }
        @keyframes timerGlow {
          0%, 100% { text-shadow: 0 0 8px currentColor; }
          50% { text-shadow: 0 0 20px currentColor, 0 0 40px currentColor; }
        }
        .orb {
          position: absolute;
          border-radius: 50%;
          filter: blur(60px);
          pointer-events: none;
        }
        .orb1 {
          width: 200px; height: 200px;
          top: 10%; left: 15%;
          background: ${COLORS.rust};
          animation: orbFloat1 25s ease-in-out infinite;
        }
        .orb2 {
          width: 250px; height: 250px;
          top: 50%; right: 10%;
          background: ${COLORS.dustyTeal};
          animation: orbFloat2 30s ease-in-out infinite;
        }
        .orb3 {
          width: 180px; height: 180px;
          bottom: 15%; left: 40%;
          background: ${COLORS.olive};
          animation: orbFloat3 22s ease-in-out infinite;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        input::placeholder { color: ${COLORS.muted}; }
      `}</style>
    </div>
  );
}

function GameOverScreen({ score, round, onRestart }) {
  const [show, setShow] = useState(false);
  useEffect(() => { setShow(true); }, []);

  return (
    <div style={{
      minHeight: "100vh", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center",
      background: `linear-gradient(160deg, ${COLORS.bgDark} 0%, ${COLORS.bg} 100%)`,
      fontFamily: "'DM Sans', sans-serif", padding: "24px",
    }}>
      <div style={{
        opacity: show ? 1 : 0, transform: show ? "translateY(0)" : "translateY(20px)",
        transition: "all 0.8s ease", textAlign: "center",
      }}>
        <div style={{
          fontSize: "11px", letterSpacing: "4px", color: COLORS.stone,
          textTransform: "uppercase", marginBottom: "12px",
        }}>
          Game Over
        </div>
        <div style={{
          fontSize: "64px", fontWeight: 700, color: COLORS.cream,
          fontFamily: "'Playfair Display', serif", lineHeight: 1,
        }}>
          {Math.max(0, score)}
        </div>
        <div style={{ color: COLORS.stone, fontSize: "14px", marginTop: "8px" }}>
          Final Score · Round {round}
        </div>
        <div style={{
          width: "40px", height: "2px", background: COLORS.rust,
          margin: "28px auto",
        }} />
        <div style={{
          color: COLORS.sand, fontSize: "15px", marginBottom: "36px", lineHeight: 1.6,
        }}>
          {round <= 5 ? "Good effort! Each game sharpens your skills." :
           round <= 15 ? "Well played! You have a sharp mind." :
           round <= 30 ? "Impressive run! You're in rare company." :
           "Extraordinary. A true master of deduction."}
        </div>
        <button onClick={async () => { await ensureAudio(); onRestart(); }} style={{
          background: COLORS.rust, color: COLORS.warmWhite,
          border: "none", borderRadius: "40px", padding: "16px 48px",
          fontSize: "15px", fontWeight: 600, cursor: "pointer",
          letterSpacing: "2px", textTransform: "uppercase",
          boxShadow: `0 4px 24px rgba(184, 115, 74, 0.4)`,
        }}>
          Play Again
        </button>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("title");
  const [finalScore, setFinalScore] = useState(0);
  const [finalRound, setFinalRound] = useState(0);

  const handleGameOver = (s, r) => {
    setFinalScore(s);
    setFinalRound(r);
    setScreen("gameover");
  };

  if (screen === "title") return <TitleScreen onStart={() => setScreen("game")} />;
  if (screen === "game") return <GameScreen onGameOver={handleGameOver} />;
  return <GameOverScreen score={finalScore} round={finalRound} onRestart={() => setScreen("title")} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
